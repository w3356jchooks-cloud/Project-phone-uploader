name: Build Kivy App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install --upgrade buildozer cython

      - name: Build with Buildozer
        run: |
          echo "--- Searching for buildozer.spec ---"
          find . -name "buildozer.spec"
          
          # This line automatically finds the folder containing your spec file
          SPEC_DIR=$(dirname $(find . -name "buildozer.spec" | head -n 1))
          
          echo "--- Moving to $SPEC_DIR and building ---"
          cd $SPEC_DIR
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kivy-App-APK
          # Finds the APK regardless of which subfolder it was built in
          path: "**/bin/*.apk"
